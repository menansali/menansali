<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark Background -->
    <rect width="800" height="200" fill="#0D1117"/>
    
    <!-- Enhanced Gradients - Option 1 Dark Blue/Purple -->
    <radialGradient id="centerRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.9" />
      <stop offset="70%" style="stop-color:#8B5CF6;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.5" />
    </radialGradient>
    
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="techGradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.4" />
    </linearGradient>
    
    <linearGradient id="techGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.4" />
    </linearGradient>
    
    <!-- Enhanced Filters -->
    <filter id="enhancedGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366F1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Animated Background Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#6366F1" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="800" height="200" fill="url(#grid)">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="6s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Floating Background Orbs -->
  <circle cx="150" cy="50" r="30" fill="url(#techGradient1)" opacity="0.25">
    <animateTransform attributeName="transform" type="translate" values="0,0; 10,-5; 0,0" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="25;35;25" dur="6s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="650" cy="150" r="25" fill="url(#techGradient2)" opacity="0.3">
    <animateTransform attributeName="transform" type="translate" values="0,0; -8,8; 0,0" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="r" values="20;30;20" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Enhanced Center Element -->
  <circle cx="400" cy="100" r="35" fill="none" stroke="url(#primaryGradient)" stroke-width="3" opacity="0.9" filter="url(#enhancedGlow)">
    <animate attributeName="r" values="30;40;30" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Inner Center Circle -->
  <circle cx="400" cy="100" r="20" fill="url(#centerRadial)">
    <animate attributeName="r" values="18;22;18" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Enhanced Center Text -->
  <text x="400" y="108" text-anchor="middle" fill="#F8FAFC" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" filter="url(#enhancedGlow)">MENAN</text>
  
  <!-- Enhanced Tech Modules - iOS Focus -->
  <g>
    <!-- iOS Module - More Prominent -->
    <rect x="300" y="50" width="100" height="45" rx="22" fill="#1A1D29" stroke="#6366F1" stroke-width="2.5" opacity="0.95" filter="url(#cardShadow)">
      <animate attributeName="y" values="50;45;50" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="2.5;3.5;2.5" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="350" y="75" text-anchor="middle" fill="#6366F1" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">iOS</text>
    
    <!-- Swift Module -->
    <rect x="130" y="60" width="90" height="40" rx="20" fill="#1A1D29" stroke="#8B5CF6" stroke-width="2" opacity="0.95" filter="url(#cardShadow)">
      <animate attributeName="y" values="60;55;60" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <text x="175" y="82" text-anchor="middle" fill="#8B5CF6" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Swift</text>
    
    <!-- JavaScript Module -->
    <rect x="530" y="60" width="90" height="40" rx="20" fill="#1A1D29" stroke="#A78BFA" stroke-width="2" opacity="0.95" filter="url(#cardShadow)">
      <animate attributeName="y" values="60;55;60" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <text x="575" y="82" text-anchor="middle" fill="#A78BFA" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">JS</text>
    
    <!-- Frontend Module -->
    <rect x="130" y="110" width="90" height="40" rx="20" fill="#1A1D29" stroke="#EC4899" stroke-width="2" opacity="0.95" filter="url(#cardShadow)">
      <animate attributeName="y" values="110;105;110" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2.8s" repeatCount="indefinite"/>
    </rect>
    <text x="175" y="132" text-anchor="middle" fill="#EC4899" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Frontend</text>
    
    <!-- SwiftUI Module -->
    <rect x="530" y="110" width="90" height="40" rx="20" fill="#1A1D29" stroke="#6366F1" stroke-width="2" opacity="0.95" filter="url(#cardShadow)">
      <animate attributeName="y" values="110;105;110" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <text x="575" y="132" text-anchor="middle" fill="#6366F1" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">SwiftUI</text>
  </g>
  
  <!-- Enhanced Connection Lines with Dots -->
  <g>
    <line x1="220" y1="100" x2="300" y2="100" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
    </line>
    <circle cx="260" cy="100" r="3" fill="#6366F1" opacity="0.9">
      <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <line x1="400" y1="100" x2="530" y2="100" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.5s" repeatCount="indefinite"/>
    </line>
    <circle cx="465" cy="100" r="3" fill="#8B5CF6" opacity="0.9">
      <animate attributeName="r" values="2;4;2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Additional Tech Indicators - IoT & Frontend -->
  <g>
    <!-- HTML -->
    <rect x="50" y="40" width="60" height="26" rx="13" fill="#6366F1" fill-opacity="0.25" stroke="#6366F1" stroke-width="1.5" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="80" y="57" text-anchor="middle" fill="#6366F1" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500">HTML</text>
    
    <!-- CSS -->
    <rect x="690" y="40" width="60" height="26" rx="13" fill="#8B5CF6" fill-opacity="0.25" stroke="#8B5CF6" stroke-width="1.5" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <text x="720" y="57" text-anchor="middle" fill="#8B5CF6" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500">CSS</text>
    
    <!-- Arduino -->
    <rect x="50" y="134" width="60" height="26" rx="13" fill="#A78BFA" fill-opacity="0.25" stroke="#A78BFA" stroke-width="1.5" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="80" y="151" text-anchor="middle" fill="#A78BFA" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500">Arduino</text>
    
    <!-- Raspberry Pi -->
    <rect x="690" y="134" width="60" height="26" rx="13" fill="#EC4899" fill-opacity="0.25" stroke="#EC4899" stroke-width="1.5" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <text x="720" y="151" text-anchor="middle" fill="#EC4899" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500">RPi</text>
  </g>
  
  <!-- Floating Particle Effects -->
  <circle cx="100" cy="160" r="2" fill="#6366F1" opacity="0.7">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 5,-10; 0,0" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="700" cy="30" r="2" fill="#8B5CF6" opacity="0.7">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; -5,-8; 0,0" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="50" cy="80" r="1.5" fill="#A78BFA" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 8,5; 0,0" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="750" cy="120" r="1.5" fill="#EC4899" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; -8,6; 0,0" dur="3.6s" repeatCount="indefinite"/>
  </circle>
</svg>
