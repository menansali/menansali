<svg width="700" height="60" viewBox="0 0 700 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark Background -->
    <rect width="700" height="60" fill="#0D1117"/>
    
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  
  <!-- Subtle Animated Wave -->
  <path d="M50,30 Q200,15 350,30 T650,30 L650,0 L50,0 Z" fill="url(#headerGradient)">
    <animate attributeName="d" 
             values="M50,30 Q200,15 350,30 T650,30 L650,0 L50,0 Z;M50,30 Q200,45 350,30 T650,30 L650,0 L50,0 Z;M50,30 Q200,15 350,30 T650,30 L650,0 L50,0 Z" 
             dur="6s" repeatCount="indefinite"/>
  </path>
  
  <!-- Subtle Floating Elements -->
  <circle cx="150" cy="15" r="2" fill="#6366F1" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,8; 0,0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="45" r="2" fill="#8B5CF6" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="25" r="1.5" fill="#EC4899" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,6; 0,0" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4.5s" repeatCount="indefinite"/>
  </circle>
</svg>
